server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: crypto-bot-starter
  lifecycle:
    timeout-per-shutdown-phase: 30s

management:
  endpoints:
    web:
      exposure:
        include: health,info

bot:
  enabled: false          # master switch. Keep false until you're ready.
  dry-run: true           # true = logs intended orders, does not place them.
  fixed-rate-ms: 900000   # 15 minutes
  product-ids:
    - BTC-USD
    - ETH-USD
    - SOL-USD
  buy-quote-size-usd: "25.00"
  min-usd-cash-reserve: "500.00"
  max-single-buy-usd: "50.00"
  max-daily-buy-usd: "100.00"
  dip-threshold-percent: "5.0" # buy only when 24h drop >= this threshold
  discord-webhook-url: ${DISCORD_WEBHOOK_URL:}
  max-buy-quote-size-usd: ${BOT_MAX_BUY_QUOTE_SIZE_USD:10.00}
  live-trading-enabled: ${BOT_LIVE_TRADING_ENABLED:false}
  agent-enabled: ${BOT_AGENT_ENABLED:false}
  agent-min-confidence: ${BOT_AGENT_MIN_CONFIDENCE:0.70}

openai:
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-5.5-mini}

resilience4j:
  circuitbreaker:
    instances:
      coinbaseApi:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10s
        failureRateThreshold: 50.0
        recordExceptions:
          - java.net.ConnectException
          - java.util.concurrent.TimeoutException
        ignoreExceptions:
          - java.lang.IllegalArgumentException

coinbase:
  base-url: https://api.coinbase.com
  api-key-name: ${COINBASE_API_KEY_NAME:}
  private-key-pem: ${COINBASE_PRIVATE_KEY_PEM:}
