server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: crypto-bot-starter
  lifecycle:
    timeout-per-shutdown-phase: 30s
  r2dbc:
    url: ${DATABASE_URL:}
    username: ${DATABASE_USERNAME:}
    password: ${DATABASE_PASSWORD:}

  flyway:
    enabled: true
    url: ${FLYWAY_DATABASE_URL:}
    user: ${DATABASE_USERNAME:}
    password: ${DATABASE_PASSWORD:}

management:
  endpoints:
    web:
      exposure:
        include: health,info

bot:
  enabled: false          # master switch. Keep false until you're ready.
  dry-run: true           # true = logs intended orders, does not place them.
  fixed-rate-ms: 300000
  product-id: BTC-USD
  buy-quote-size-usd: "25.00"
  min-usd-cash-reserve: "500.00"
  max-single-buy-usd: "50.00"
  max-daily-buy-usd: "100.00"
  dip-threshold-percent: "-100" # buy only when 24h drop >= this threshold
  discord-webhook-url: ${DISCORD_WEBHOOK_URL:}

resilience4j:
  circuitbreaker:
    instances:
      coinbaseApi:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10s
        failureRateThreshold: 50.0
        recordExceptions:
          - java.net.ConnectException
          - java.util.concurrent.TimeoutException
        ignoreExceptions:
          - java.lang.IllegalArgumentException

coinbase:
  base-url: https://api.coinbase.com
  api-key-name: ${COINBASE_API_KEY_NAME:}
  private-key-pem: ${COINBASE_PRIVATE_KEY_PEM:}
