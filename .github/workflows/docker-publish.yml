name: Build and Publish Docker Image

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 26
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '26'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Prepare and Build bootJar
        run: |
          ls -la
          file gradlew || true
          chmod +x gradlew || true
          ./gradlew bootJar -x test --no-daemon --console=plain

      - name: Decode GCP service account key
        run: echo "${{ secrets.GCP_SA_KEY_B64 }}" | base64 --decode > gha-deployer-key.json

      - name: Authenticate to GCP
        run: |
          gcloud auth activate-service-account --key-file=gha-deployer-key.json
          gcloud config set project ${{ secrets.GCP_PROJECT }}
        env:
          CLOUDSDK_CORE_PROJECT: ${{ secrets.GCP_PROJECT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE=us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/ar-repo/crypto-retard
          docker build -t $IMAGE:${{ github.sha }} .
          docker tag $IMAGE:${{ github.sha }} $IMAGE:latest
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest
